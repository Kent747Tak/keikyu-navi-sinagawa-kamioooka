<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#cc2233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="京急ナビ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>京急ナビ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#cc2233;--red-dark:#991a26;--red-light:#f5e0e2;
  --orange:#d4700a;--orange-light:#fef0e0;
  --blue:#1a5fa8;--blue-light:#e0eaf8;
  --purple:#5c3fa0;--purple-light:#ede8f8;
  --gray:#5a5a5a;--gray-light:#f0efeb;
  --green:#1a7a4a;--green-light:#e0f2e9;
  --bg:#f8f7f5;--card:#ffffff;--text:#1a1a1a;--muted:#888;
  --border:#e0ddd8;--radius:12px;--safe-top:env(safe-area-inset-top,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0}
.app{max-width:480px;margin:0 auto;padding:calc(var(--safe-top) + 1rem) 1rem 2rem}

/* header */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem}
.hdr-left{}
.station-label{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.station-name{font-size:26px;font-weight:700;color:var(--text);line-height:1;display:flex;align-items:center;gap:6px}
.station-arrow{color:var(--muted);font-size:18px;font-weight:400}
.station-to{color:var(--red)}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.clock{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.02em}
.day-pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;letter-spacing:.04em}
.weekday{background:var(--blue-light);color:var(--blue)}
.weekend{background:var(--green-light);color:var(--green)}

/* train list */
.train-list{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.train-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);position:relative}
.train-row:last-child{border-bottom:none}
.train-row.first-train{background:#fffcfc}
.first-train-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);border-radius:2px 0 0 2px}

.time-col{min-width:54px}
.time{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;color:var(--text)}
.countdown{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.countdown.soon{color:var(--red);font-weight:600}

.badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:5px;white-space:nowrap;min-width:52px;text-align:center}
.b-快特{background:var(--red-light);color:var(--red)}
.b-エアポート快特{background:var(--orange-light);color:var(--orange)}
.b-特急{background:var(--orange-light);color:var(--orange)}
.b-急行{background:var(--blue-light);color:var(--blue)}
.b-ウィング{background:var(--purple-light);color:var(--purple)}
.b-普通{background:var(--gray-light);color:var(--gray)}

.dest-col{flex:1;display:flex;flex-direction:column;gap:3px}
.dest{font-size:16px;color:var(--text)}
.first-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;background:var(--green-light);color:var(--green);align-self:flex-start}

.no-trains{padding:2.5rem;text-align:center;color:var(--muted);font-size:14px}

/* direction buttons */
.dir-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dir-btn{padding:11px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);line-height:1.3;text-align:center;transition:all .15s}
.dir-btn.active{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:600}
.dir-btn-sub{font-size:11px;margin-top:2px;opacity:.75}

/* construction */
.construction{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:2rem;text-align:center}
.cone{font-size:40px;margin-bottom:.5rem}
.construction h2{font-size:17px;font-weight:600;color:var(--text);margin-bottom:.5rem}
.construction p{font-size:13px;color:var(--muted);line-height:1.6}

.footer{margin-top:1rem;text-align:center;font-size:10px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="station-label">京急線 次発案内</div>
      <div class="station-name" id="route-display">
        <span id="from-sta">品川</span>
        <span class="station-arrow">→</span>
        <span class="station-to" id="to-sta">上大岡方面</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="clock">--:--</div>
      <div class="day-pill weekday" id="day-pill">平日</div>
    </div>
  </div>

  <div id="main-content">
    <div class="train-list" id="train-list">
      <div class="no-trains">読み込み中...</div>
    </div>
  </div>

  <div class="dir-wrap">
    <button class="dir-btn active" id="btn-down" onclick="setDir('down')">
      ← 下り
      <div class="dir-btn-sub">品川 → 上大岡方面</div>
    </button>
    <button class="dir-btn" id="btn-up" onclick="setDir('up')">
      上り →
      <div class="dir-btn-sub">上大岡 → 品川</div>
    </button>
  </div>

  <div class="footer" id="update-time">— 起動時刻: --:-- —</div>
</div>

let dir = 'down';

function isWeekend(d){ const w=d.getDay(); return w===0||w===6; }
function dayKey(d){ return isWeekend(d)?'土日祝':'平日'; }
function pad(n){ return String(n).padStart(2,'0'); }

function badgeClass(type){
  const m={'快特':'b-快特','エアポート快特':'b-エアポート快特','特急':'b-特急','急行':'b-急行','ウィング':'b-ウィング'};
  return m[type]||'b-普通';
}

function getUpcoming(now, count=5){
  const key = dayKey(now);
  const trains = TT[key] || [];
  const nowM = now.getHours()*60 + now.getMinutes();
  // handle midnight entries (h=0 means next day 0:xx, treat as 24:xx)
  const list = trains.map(t => {
    const hh = t.h === 0 ? 24 : t.h;
    return {...t, totalM: hh*60+t.m};
  });
  return list.filter(t => t.totalM >= nowM).slice(0,count);
}

function formatCountdown(totalM, nowM){
  const diff = totalM - nowM;
  if(diff <= 0) return '<span class="countdown soon">まもなく</span>';
  if(diff <= 3) return `<span class="countdown soon">あと${diff}分</span>`;
  return `<span class="countdown">あと${diff}分</span>`;
}

function renderTrains(){
  const now = new Date();
  const nowM = now.getHours()*60 + now.getMinutes();
  const el = document.getElementById('train-list');

  if(dir === 'up'){
    document.getElementById('main-content').innerHTML = `
      <div class="construction">
        <div class="cone">🚧</div>
        <h2>上り（上大岡→品川）</h2>
        <p>時刻表データを準備中です。<br>しばらくお待ちください。</p>
      </div>`;
    return;
  }

  // restore train-list if switching back
  if(!document.getElementById('train-list')){
    document.getElementById('main-content').innerHTML = '<div class="train-list" id="train-list"></div>';
  }
  const listEl = document.getElementById('train-list');

  const trains = getUpcoming(now);
  if(trains.length === 0){
    listEl.innerHTML = '<div class="no-trains">本日の運行は終了しました</div>';
    return;
  }

  listEl.innerHTML = trains.map((t,i) => `
    <div class="train-row${i===0?' first-train':''}">
      ${i===0?'<div class="first-train-bar"></div>':''}
      <div class="time-col">
        <div class="time">${pad(t.h===24?0:t.h)}:${pad(t.m)}</div>
        ${formatCountdown(t.totalM, nowM)}
      </div>
      <span class="badge ${badgeClass(t.type)}">${t.type}</span>
      <div class="dest-col">
        <div class="dest">${t.dest}</div>
        ${t.first?'<span class="first-badge">始発</span>':''}
      </div>
    </div>`).join('');
}

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const pill = document.getElementById('day-pill');
  const weekend = isWeekend(now);
  pill.textContent = weekend ? '土日祝' : '平日';
  pill.className = 'day-pill ' + (weekend ? 'weekend' : 'weekday');
}

function setDir(d){
  dir = d;
  document.getElementById('btn-down').className = 'dir-btn' + (d==='down'?' active':'');
  document.getElementById('btn-up').className   = 'dir-btn' + (d==='up'  ?' active':'');
  document.getElementById('from-sta').textContent = d==='down' ? '品川' : '上大岡';
  document.getElementById('to-sta').textContent   = d==='down' ? '上大岡方面' : '品川';
  renderTrains();
}

function init(){
  updateClock();
  renderTrains();
  const now = new Date();
  document.getElementById('update-time').textContent =
    `データ：京急2026年版 ／ 起動 ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

init();
setInterval(()=>{ updateClock(); renderTrains(); }, 30000);
setInterval(updateClock, 1000);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
